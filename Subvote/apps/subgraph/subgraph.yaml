specVersion: 1.3.0
description: Subvote subgraph scaffold for Polkadot Hub TestNet
repository: https://github.com/your-org/subvote
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: SubvoteContract
    network: polkadot-hub-testnet
    source:
      # TODO: Replace with the deployed contract you want to index.
      address: "0x0000000000000000000000000000000000000000"
      abi: SubvoteContract
      # TODO: Replace with the first block that contains relevant events.
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VoteCast
      abis:
        - name: SubvoteContract
          file: ./abis/SubvoteContract.json
      eventHandlers:
        - event: VoteCast(indexed uint256,indexed address,string)
          handler: handleVoteCast
      file: ./src/mapping.ts
