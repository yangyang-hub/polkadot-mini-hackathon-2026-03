<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520" fill="none" preserveAspectRatio="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── CORNER L-BRACKETS ── -->
  <g filter="url(#glow)">
    <!-- Top-left -->
    <path d="M20 60 L20 16 L64 16" stroke="#ff44dd" strokeWidth="2.5" strokeLinecap="square"/>
    <rect x="16" y="20" width="5" height="5" fill="#ff44dd"/>
    <rect x="64" y="12" width="5" height="5" fill="#ff44dd" opacity="0.7"/>

    <!-- Top-right -->
    <path d="M420 60 L420 16 L376 16" stroke="#ff44dd" strokeWidth="2.5" strokeLinecap="square"/>
    <rect x="420" y="20" width="5" height="5" fill="#ff44dd"/>
    <rect x="371" y="12" width="5" height="5" fill="#ff44dd" opacity="0.7"/>

    <!-- Bottom-left -->
    <path d="M20 460 L20 504 L64 504" stroke="#ff44dd" strokeWidth="2.5" strokeLinecap="square"/>
    <rect x="16" y="495" width="5" height="5" fill="#ff44dd"/>

    <!-- Bottom-right -->
    <path d="M420 460 L420 504 L376 504" stroke="#ff44dd" strokeWidth="2.5" strokeLinecap="square"/>
    <rect x="420" y="495" width="5" height="5" fill="#ff44dd"/>
  </g>

  <!-- ── OUTER BORDER ── -->
  <g filter="url(#glowSoft)">
    <line x1="20" y1="16" x2="420" y2="16" stroke="#ff44dd" strokeWidth="1.2" opacity="0.8"/>
    <line x1="20" y1="504" x2="420" y2="504" stroke="#ff44dd" strokeWidth="1.2" opacity="0.8"/>
    <line x1="20" y1="16" x2="20" y2="504" stroke="#ff44dd" strokeWidth="1.2" opacity="0.8"/>
    <line x1="420" y1="16" x2="420" y2="504" stroke="#ff44dd" strokeWidth="1.2" opacity="0.8"/>
  </g>

  <!-- ── INNER BORDER (inset) ── -->
  <rect x="32" y="28" width="376" height="464" rx="1"
    stroke="#dd33cc" strokeWidth="0.8" opacity="0.4"/>

  <!-- ── TOP EDGE notches ── -->
  <g filter="url(#glowSoft)" stroke="#ff44dd" strokeWidth="1" opacity="0.65">
    <line x1="160" y1="16" x2="160" y2="24"/>
    <line x1="180" y1="16" x2="180" y2="20"/>
    <line x1="220" y1="16" x2="220" y2="24"/>
    <line x1="240" y1="16" x2="240" y2="20"/>
    <rect x="196" y="14" width="5" height="5" fill="#ff44dd" opacity="0.5"/>
    <rect x="300" y="14" width="5" height="5" fill="#ff44dd" opacity="0.5"/>
  </g>

  <!-- ── RIGHT SIDE decorations ── -->
  <g filter="url(#glowSoft)" opacity="0.7">
    <line x1="428" y1="120" x2="428" y2="144" stroke="#ff44dd" strokeWidth="1.5"/>
    <line x1="428" y1="152" x2="428" y2="162" stroke="#ff44dd" strokeWidth="1"/>
    <circle cx="432" cy="220" r="4" stroke="#ff44dd" strokeWidth="1.2" fill="none"/>
    <circle cx="432" cy="234" r="2.5" stroke="#ff44dd" strokeWidth="1" fill="none"/>
    <circle cx="432" cy="244" r="1.5" fill="#ff44dd" opacity="0.5"/>
    <circle cx="432" cy="252" r="1" fill="#ff44dd" opacity="0.3"/>
    <line x1="426" y1="310" x2="426" y2="330" stroke="#ff44dd" strokeWidth="1"/>
    <rect x="424" y="340" width="5" height="5" stroke="#ff44dd" strokeWidth="1" fill="none"/>
  </g>

  <!-- ── LEFT SIDE decorations ── -->
  <g filter="url(#glowSoft)" opacity="0.7">
    <line x1="12" y1="115" x2="12" y2="139" stroke="#ff44dd" strokeWidth="1.5"/>
    <line x1="12" y1="147" x2="12" y2="157" stroke="#ff44dd" strokeWidth="1"/>
    <path d="M12 370 L12 390 L20 390" stroke="#ff44dd" strokeWidth="1" opacity="0.5"/>
    <path d="M12 350 L6 350 L6 380 L12 380" stroke="#ff44dd" strokeWidth="1" opacity="0.4"/>
    <rect x="2" y="345" width="5" height="5" stroke="#ff44dd" strokeWidth="1" fill="none"/>
    <circle cx="8" cy="272" r="3" stroke="#ff44dd" strokeWidth="1" fill="none"/>
    <circle cx="8" cy="282" r="2" stroke="#ff44dd" strokeWidth="1" fill="none"/>
    <circle cx="8" cy="290" r="1.5" fill="#ff44dd" opacity="0.5"/>
  </g>

  <!-- ── BOTTOM EDGE dots ── -->
  <g filter="url(#glowSoft)" opacity="0.55">
    <circle cx="110" cy="512" r="2" fill="#ff44dd"/>
    <circle cx="118" cy="512" r="1.5" fill="#ff44dd" opacity="0.6"/>
    <circle cx="125" cy="512" r="1" fill="#ff44dd" opacity="0.3"/>
    <circle cx="310" cy="512" r="2" fill="#ff44dd"/>
    <circle cx="318" cy="512" r="1.5" fill="#ff44dd" opacity="0.6"/>
    <circle cx="325" cy="512" r="1" fill="#ff44dd" opacity="0.3"/>
  </g>
</svg>
